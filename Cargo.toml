[workspace]
resolver = "2"
members = [
    "crates/biblia-core",
    "crates/biblia-cli",
    "crates/biblia-tui",
    "xtask",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/rbritobut/biblia"
authors = ["Bíblia CLI contributors"]
rust-version = "1.80"

[profile.release]
strip = true
lto = "thin"
