name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Formatação e lint: rápido, roda só no Linux.
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Testes em Linux/macOS/Windows. SQLite é bundled e o TLS é rustls
  # (rustls-platform-verifier), então não há dependência de sistema (OpenSSL).
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace --all-targets
      - name: cargo test (doctests)
        run: cargo test --workspace --doc

  # Garante que a MSRV declarada (rust-version) ainda compila.
  msrv:
    name: build (MSRV 1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --workspace

  # Valida o build de release com Cargo.lock travado (paridade com o release.yml),
  # pegando cedo problemas de resolução que `cargo test` (sem --locked) não pega.
  locked-release:
    name: build --release --locked
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release --locked
        run: cargo build --release --locked -p the-light-cli
