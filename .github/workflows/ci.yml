name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Formatação e lint: rápido, roda só no Linux.
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Testes em Linux/macOS/Windows. SQLite é bundled e o TLS é rustls
  # (rustls-platform-verifier), então não há dependência de sistema (OpenSSL).
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace --all-targets
      - name: cargo test (doctests)
        run: cargo test --workspace --doc

  # Superfície PURA para wasm (ADR-0062): garante que `ai-pure` (sem `embedded`)
  # compila para `wasm32-unknown-unknown` SEM arrastar rusqlite/reqwest — é o alvo que
  # a fronteira `the-light-app` consome no web. A superfície DATA-ONLY de transporte
  # (`*_body`/`*_extract`/`*_stream_delta`/URLs/headers/`DEFAULT_MAX_TOKENS`) é `pub` e
  # tem de permanecer wasm-safe; este portão pega qualquer regressão no PRÓPRIO core.
  wasm-pure:
    name: build ai-pure (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: cargo build (ai-pure, wasm32)
        run: cargo build -p the-light-core --no-default-features --features ai-pure --target wasm32-unknown-unknown

  # Garante que a MSRV declarada (rust-version) ainda compila.
  msrv:
    name: build (MSRV 1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --workspace

  # Valida o build de release com Cargo.lock travado (paridade com o release.yml),
  # pegando cedo problemas de resolução que `cargo test` (sem --locked) não pega.
  locked-release:
    name: build --release --locked
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release --locked
        run: cargo build --release --locked -p the-light-cli
