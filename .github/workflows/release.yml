name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # necessário para criar a GitHub Release e anexar binários

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build (release)
        run: cargo build --release --locked -p biblia-cli --target ${{ matrix.target }}

      # Empacota o binário `biblia` (+ licenças e README) num tar.gz/zip.
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          name="biblia-${GITHUB_REF_NAME}-${{ matrix.target }}"
          staging="$name"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/biblia" "$staging/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$staging/"
          tar czf "$name.tar.gz" "$staging"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"
          echo "ASSET=$name.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $name = "biblia-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $name | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/biblia.exe" $name
          Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE $name
          Compress-Archive -Path $name -DestinationPath "$name.zip"
          (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower() + "  $name.zip" | Out-File "$name.zip.sha256" -Encoding ascii
          "ASSET=$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ascii

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
